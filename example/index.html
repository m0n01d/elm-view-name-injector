<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>elm-view-name-injector demo</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- load the TAGGED bundle (cache-busted so rebuilds always take effect) -->
    <script>
      var s = document.createElement('script');
      s.src = 'out.tagged.js?t=' + Date.now();
      s.onload = function () { Elm.Main.init({ node: document.getElementById('root') }); };
      document.body.appendChild(s);
    </script>
  </body>
</html>
